name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  qml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt tools
        run: sudo apt-get install -y qml6-module-qtquick qt6-declarative-dev

      - name: qmllint
        run: find package/contents -name "*.qml" | xargs qmllint --unresolved-type info

      - name: qmlformat check
        run: find package/contents -name "*.qml" | xargs qmlformat --dry-run 2>&1 | grep -q "would reformat" && echo "Files need formatting, run qmlformat -i" && exit 1 || true
